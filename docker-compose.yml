services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PORT=8000
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    depends_on:
      - qdrant

volumes:
  qdrant_data:
